<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <!-- footer — correntes de tinta suminagashi + fim de partida -->
  <defs>
    <filter id="flow" x="-10%" y="-60%" width="120%" height="220%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.03" numOctaves="2" seed="21"/>
      <feDisplacementMap in="SourceGraphic" scale="26" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="edges" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="0.12" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="0.88" stop-color="#0a0a0a" stop-opacity="0"/>
      <stop offset="1"    stop-color="#0a0a0a" stop-opacity="1"/>
    </linearGradient>
    <pattern id="scan" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>

  <rect width="900" height="140" fill="#0a0a0a"/>

  <!-- correntes de tinta (deriva lenta sob o ruído estático) -->
  <g filter="url(#flow)" fill="none" stroke="#f2f2f2">
    <animateTransform attributeName="transform" type="translate" dur="50s" repeatCount="indefinite"
      values="0 0; 16 4; 0 0; -12 -3; 0 0"/>
    <path stroke-width="0.9" stroke-opacity="0.20" d="M-30 38  C 140 30, 300 48, 460 38  S 760 28, 930 40"/>
    <path stroke-width="0.5" stroke-opacity="0.14" d="M-30 52  C 160 46, 320 60, 470 52  S 740 44, 930 54"/>
    <path stroke-width="0.8" stroke-opacity="0.17" d="M-30 68  C 150 62, 310 76, 465 68  S 750 58, 930 70"/>
    <path stroke-width="0.4" stroke-opacity="0.11" d="M-30 84  C 145 78, 305 92, 455 84  S 745 76, 930 86"/>
    <path stroke-width="0.7" stroke-opacity="0.14" d="M-30 100 C 155 94, 315 108, 460 100 S 755 92, 930 102"/>
    <path stroke-width="0.4" stroke-opacity="0.08" d="M-30 114 C 150 108, 310 120, 458 114 S 748 106, 930 116"/>
  </g>
  <rect width="900" height="140" fill="url(#edges)"/>

  <!-- fim de partida -->
  <rect x="330" y="56" width="240" height="30" fill="#0a0a0a" opacity="0.85"/>
  <text x="450" y="76" text-anchor="middle" font-size="13" letter-spacing="4" fill="#8a8a8a">1-0 · good game</text>
  <rect x="560" y="64" width="8" height="14" fill="#8a8a8a">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect width="900" height="140" fill="url(#scan)"/>
  <rect x="0.5" y="0.5" width="899" height="139" fill="none" stroke="#222222"/>
</svg>
