<svg width="900" height="470" viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <!-- stack.board — tabuleiro digital da tech stack (gerado por gen_stack_board.py) -->
  <defs>
    <filter id="marble" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.02" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="45" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <g id="bloom" fill="none" stroke="#f2f2f2">
      <circle r="4" stroke-width="1.1" stroke-opacity="0.45"/>
      <circle r="9" stroke-width="0.5" stroke-opacity="0.42"/>
      <circle r="15" stroke-width="1.1" stroke-opacity="0.38"/>
      <circle r="23" stroke-width="0.5" stroke-opacity="0.35"/>
      <circle r="32" stroke-width="1.1" stroke-opacity="0.32"/>
      <circle r="42" stroke-width="0.5" stroke-opacity="0.28"/>
      <circle r="54" stroke-width="1.1" stroke-opacity="0.25"/>
      <circle r="66" stroke-width="0.5" stroke-opacity="0.22"/>
      <circle r="80" stroke-width="1.1" stroke-opacity="0.18"/>
      <circle r="94" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle r="110" stroke-width="1.1" stroke-opacity="0.12"/>
      <circle r="126" stroke-width="0.5" stroke-opacity="0.08"/>
    </g>
    <pattern id="scan" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>

  <rect width="900" height="470" fill="#0a0a0a"/>

  <!-- tinta suminagashi no canto -->
  <g filter="url(#marble)" opacity="0.5">
    <g transform="translate(858 38)">
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="0" to="360" dur="150s" repeatCount="indefinite"/>
      <use xlink:href="#bloom"/>
    </g>
  </g>
  <g filter="url(#marble)" opacity="0.35">
    <g transform="translate(40 448)">
      <animateTransform attributeName="transform" type="rotate" additive="sum" from="360" to="0" dur="180s" repeatCount="indefinite"/>
      <use xlink:href="#bloom"/>
    </g>
  </g>

  <text x="40" y="42" font-size="15" fill="#8a8a8a"><tspan fill="#4f4f4f">$ </tspan>cat stack.board</text>

