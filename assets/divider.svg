<svg width="900" height="28" viewBox="0 0 900 28" xmlns="http://www.w3.org/2000/svg">
  <!-- divisor: linha de tinta que se desenha sozinha + cursor piscando
       fundo transparente · cinza médio visível em tema claro e escuro -->
  <defs>
    <filter id="ink" x="-10%" y="-300%" width="120%" height="700%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.09" numOctaves="2" seed="4"/>
      <feDisplacementMap in="SourceGraphic" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <g filter="url(#ink)">
    <path fill="none" stroke="#7a7a7a" stroke-width="1" stroke-opacity="0.9"
      d="M30 14 C 180 9, 320 19, 450 14 S 720 9, 848 14"
      stroke-dasharray="860" stroke-dashoffset="860">
      <animate attributeName="stroke-dashoffset" dur="10s" repeatCount="indefinite"
        values="860;860;0;0" keyTimes="0;0.04;0.42;1"/>
    </path>
  </g>

  <g>
    <animate attributeName="opacity" dur="10s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.4;0.45;1"/>
    <rect x="858" y="9" width="7" height="11" fill="#7a7a7a">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
